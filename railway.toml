[build]
# Railpack kullan — Dockerfile cache sorunu yok
# rootDirectory sayesinde backend/requirements.txt okunur (bcrypt==4.0.1 dahil)
rootDirectory = "backend"

[deploy]
# Healthcheck — pip install + uvicorn startup için yeterli süre
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
